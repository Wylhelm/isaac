<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scenario Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row main-row">
            <!-- Left Sidebar -->
            <div class="col-md-3 sidebar">
                <!-- Logo Section -->
                <div class="logo-container">
                    <img src="{{ url_for('static', filename='images/logoIsaaC3.png') }}" alt="ISAAC Logo" class="img-fluid me-2" id="isaacLogo" style="cursor: pointer;">
                    <img src="{{ url_for('static', filename='images/cgi.jpeg') }}" alt="CGI Logo" class="img-fluid">
                </div>

                <!-- File Upload Section -->
                <div class="mb-4">
                    <h6 class="mb-3 fw-bold">Upload document</h6>
                    <div class="mb-3">
                        <input type="file" class="form-control" id="fileUpload" multiple accept=".docx,.pdf,.txt,.png,.jpg,.jpeg" disabled>
                    </div>
                    <div id="uploadedFilesList">
                        <h6>Documents list</h6>
                        <ul id="fileList" class="list-group"></ul>
                    </div>
                </div>

                <!-- History Section -->
                <div>
                    <h6 class="fw-bold">History</h6>
                    <div id="scenarioHistory" class="scenario-history"></div>
                    <button id="clearHistoryBtn" class="btn btn-danger btn-sm mt-2">Clear History</button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 main-content">
                <!-- Top Button Bar -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex gap-2 flex-wrap">
                        <button id="createScenarioBtn" class="btn btn-primary">Create New Scenario</button>
                        <button id="editSystemPromptBtn" class="btn btn-secondary">Edit System Prompt</button>
                        <button id="editScenarioPromptBtn" class="btn btn-secondary">Edit Scenario Prompt</button>
                        <button id="editContextWindowBtn" class="btn btn-secondary">Edit Context Window</button>
                    </div>
                    <button id="darkModeToggle" class="btn btn-success">Dark Mode</button>
                </div>

                <!-- Scenario Form -->
                <form id="scenarioForm" class="mb-3">
                    <div class="mb-3">
                        <label for="scenarioName" class="form-label fw-bold">Scenario name</label>
                        <input type="text" class="form-control" id="scenarioName" required disabled>
                    </div>

                    <div class="mb-3 position-relative">
                        <h6 class="mb-2 fw-bold">Criteria</h6>
                        <textarea class="form-control" id="criteria" required disabled></textarea>
                        <div id="criteriaPlaceholder" class="position-absolute top-50 start-50 translate-middle text-muted">
                            To begin, click on Create New Scenario or select one from History
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success" id="generateButton" disabled>Generate Scenario</button>
                </form>

                <!-- Generated Scenario Section -->
                <div class="flex-grow-1 d-flex flex-column">
                    <label for="generatedScenario" class="form-label fw-bold">Generated scenario</label>
                    <div id="generatedScenario" class="flex-grow-1"></div>
                    <div id="inferenceStats" style="display: none;"></div>
                    
                    <div class="d-flex gap-2 mt-2">
                        <button id="exportScenario" class="btn btn-secondary" disabled>Export Scenario</button>
                        <button id="stopGeneration" class="btn btn-danger" style="display: none;">Stop Generation</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scenario.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fileUpload.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modals.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
